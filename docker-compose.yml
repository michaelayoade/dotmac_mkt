services:
  nginx:
    image: nginx:1.27-alpine
    container_name: dotmac_mkt_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    container_name: dotmac_mkt_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  app:
    build: .
    container_name: dotmac_mkt_app
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_mkt}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
    command:
      [
        "/bin/sh",
        "-lc",
        "/app/bin/tailwindcss -i /app/static/css/input.css -o /app/static/css/styles.css --minify && exec uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload",
      ]

  worker:
    build: .
    container_name: dotmac_mkt_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_mkt}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.celery_app", "worker", "-l", "info"]

  beat:
    build: .
    container_name: dotmac_mkt_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_mkt}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.celery_app", "beat", "-l", "info"]

  db:
    image: postgres:16
    container_name: dotmac_mkt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dotmac_mkt}
    ports:
      - "127.0.0.1:5441:5432"
    volumes:
      - dotmac_mkt_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dotmac_mkt_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "127.0.0.1:6389:6379"

volumes:
  dotmac_mkt_db_data:
  certbot_www:
  certbot_conf:
