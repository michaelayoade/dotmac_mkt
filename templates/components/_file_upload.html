{% macro file_upload_zone(name, label, hint="", accept="image/*", current_url="", remove_name="remove_file") %}
{% set input_id = "file-" ~ name %}
{% set hint_id = "file-hint-" ~ name %}
<div class="rounded-xl border border-slate-200 p-4 dark:border-slate-700"
     x-data="fileUploadZone"
     data-initial='{{ {"preview": current_url} | tojson }}'>
  <label for="{{ input_id }}" class="block text-sm font-semibold text-slate-700 dark:text-slate-200">{{ label }}</label>
  {% if hint %}
  <p id="{{ hint_id }}" class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{ hint }}</p>
  {% endif %}

  <div class="mt-3 flex items-start gap-4">
    <div class="h-16 w-16 overflow-hidden rounded-lg border border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-800">
      <template x-if="hasPreview()">
        <img :src="preview" :alt="filename ? 'Preview of ' + filename : 'File preview'" class="h-full w-full object-cover">
      </template>
      <template x-if="noPreview()">
        <div class="flex h-full w-full items-center justify-center text-[10px] text-slate-400">No file</div>
      </template>
    </div>

    <div class="flex-1 space-y-2">
      <input type="file"
             id="{{ input_id }}"
             name="{{ name }}"
             accept="{{ accept }}"
             {% if hint %}aria-describedby="{{ hint_id }}"{% endif %}
             class="block w-full text-sm text-slate-600 file:mr-3 file:rounded-md file:border-0 file:bg-primary-600 file:px-3 file:py-1.5 file:text-xs file:font-semibold file:text-white hover:file:bg-primary-700"
             x-on:change="onFileChange($event)">
      <p class="text-xs text-slate-500 dark:text-slate-400" x-text="filename" aria-live="polite"></p>
      <label class="inline-flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
        <input type="checkbox" name="{{ remove_name }}" value="1" x-on:change="onRemove($event)">
        Remove current file
      </label>
    </div>
  </div>
</div>
{% endmacro %}
